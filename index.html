<html>
<head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Anonymous%20Pro%3A400%2C400italic%2C700%2C700italic" type="text/css">

<style>
* {
  box-sizing: border-box;
}

body {
background-color: #2F3640;
color: #F5F6FA;
font-family: 'Anonymous Pro',Lato,LatoExtended,sans-serif;
}

.page-content{
margin-right: 40px;
margin-left: 40px;
}

.header{
display: flex;
background-color: #1111;
padding: 40px;
height: fit-content;
}

.profile-img-container{
float: left;
margin-right: 20px;
margin-bottom: 20px;

}

.profile-text-container{
float: left;
width: auto;
height: 100%;
margin-right: 20px;
}

.profile-nav-container{
float:left;
background-color: black;
border-radius: 100px;
}

.profile-img { 
width: 150px;
height: auto;
position: absolute;
border-radius: 100%;
}

.profile-border{
position: relative;
width: 150px;
height: 150px;
border-top: 5px solid #FBC531;
border-left: 1px solid #FBC531;
border-right: 1px solid #FBC531;
border-radius: 100%;
transition: transform 1s;
}

.profile-border:hover{
transform: rotate(360deg);
}

.profile-nav-container ul{
margin: 0px;
padding: 0px;
}

.profile-nav {
list-style-type: none;
padding: 0px;
display: flex;
flex-direction: column;
align-items: stretch;
height: 100%;
background-color: #FBC531;
border-radius: 100px;
overflow: hidden;
}


.profile-nav > li{
text-align: center;
flex-grow: 1;
display: flex;
}

.profile-nav li a {
color: #000;
padding: 8px 16px;
text-decoration: none;
align-self: center;
}

.profile-nav li a:hover {
color: #FBC531;
}

.profile-nav li:hover {
background-color: #000;
}

.dropdown{
position:relative;
display: inline-block;
}

.dropdown-content{
position: absolute;
right: 0;
background: yellow;
}


@media (max-width: 640px){
.header{
display: inline-block;
}

.profile-text-container {
margin-right: 0px;
}

.profile-nav-container ul{
padding-left: 0px;
display: flex;
flex-direction: row;
align-items: stretch;
}

.profile-nav-container{
width: 100%;
}

.profile-nav li{
text-align: center;
flex-grow: 1;
display: block;
}

.profile-nav li a{
display: block;
}


}
</style>

</head>
<body>

<div class="page-content">

<div class="header">
	<div class="profile-img-container">
		<img src="https://img.itch.zone/aW1nLzEzNzU3OTUwLnBuZw==/original/nnRyIe.png" class="profile-img">
		<div class="profile-border">
		</div> 
	</div>
	<div class="profile-text-container">
		<h1><span style="color:#fbc531">Alan Brito</span></h1>
		<h1><span style="color:#fbc531">Game Dev Enthusiast</span></h1>
		<p>Bio Content

			Bio Content

			Bio Content
			Bio Content
		</p>
	</div>
	<div class="profile-nav-container">
		<ul class="profile-nav">
			<li><a href=""></a>
</li>

</div>
</div>
</body>
</html>
